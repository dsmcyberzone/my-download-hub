<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREATORHUB — Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { 
      background-color: var(--bg-primary); 
      color: var(--text-primary); 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      transition: background-color 0.3s ease, color 0.3s ease;
    }
  </style>
  <!-- Global Theme Injector -->
  <script src="assets/js/theme.js"></script>
</head>
<body class="antialiased">

  <!-- Simple Navbar -->
  <header class="sticky top-0 z-50 w-full bg-[var(--bg-secondary)] border-b border-[var(--border-color)]">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="downloads.html" class="font-bold text-xl tracking-tight text-[var(--text-primary)]">
          CREATOR<span class="font-light opacity-80">HUB</span>
        </a>
      </div>
      <a href="downloads.html" class="text-sm font-medium text-[var(--text-secondary)] hover:text-[var(--text-primary)]">
        <i class="fas fa-arrow-left"></i> Back to Downloads
      </a>
    </div>
  </header>

  <!-- Control Panel Matrix -->
  <main class="max-w-3xl mx-auto px-4 py-12">
    <div class="mb-8">
      <h1 class="text-3xl font-black tracking-tight text-[var(--text-primary)]">System Configurations</h1>
      <p class="text-sm text-[var(--text-secondary)] mt-1">Manage client-side rendering environment properties.</p>
    </div>

    <!-- Theme Mode Box -->
    <div class="p-6 bg-[var(--bg-secondary)] border border-[var(--border-color)] rounded-xl">
      <h2 class="text-lg font-bold text-[var(--text-primary)] mb-1">Visual Theme Environment</h2>
      <p class="text-sm text-[var(--text-secondary)] mb-6">Toggle between custom user palettes instantly.</p>
      
      <button onclick="toggleTheme()" class="w-full sm:w-auto px-6 py-3 rounded-xl font-medium border border-[var(--border-color)] bg-[var(--bg-primary)] text-[var(--text-primary)] hover:opacity-90 transition-all flex items-center justify-center gap-2">
        <i class="fas fa-adjust text-sm"></i> Switch Mood (Light / Night)
      </button>
    </div>
  </main>

</body>
</html>
