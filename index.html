<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREATORHUB — Premium YouTube Resource Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #f9fafb;
      --bg-secondary: #ffffff;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --accent-color: #3b82f6;
    }
    body { background-color: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  <script src="assets/js/theme.js"></script>
</head>
<body class="antialiased">

  <!-- Navbar -->
  <header class="sticky top-0 z-50 w-full bg-[var(--bg-secondary)]/80 backdrop-blur-md border-b border-[var(--border-color)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5 font-bold text-xl tracking-tight">
        <div class="w-8 h-8 rounded-lg bg-[var(--accent-color)] flex items-center justify-center text-white shadow-sm">
          <i class="fas fa-layer-group text-sm"></i>
        </div>
        <span>CREATOR<span class="font-light opacity-80">HUB</span></span>
      </a>
      <nav class="flex items-center gap-4 text-sm font-medium">
        <a href="index.html" class="text-[var(--accent-color)] font-semibold">Home</a>
        <a href="downloads.html" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">Downloads</a>
        <a href="settings.html" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">Settings</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="py-24 text-center">
    <div class="max-w-3xl mx-auto px-4">
      <h1 class="text-4xl font-black sm:text-6xl tracking-tight mb-6">
        Welcome to <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-indigo-500">CreatorHub</span>
      </h1>
      <p class="text-lg text-[var(--text-secondary)] mb-10">
        Your ultimate client-side repository for high-quality assets, templates, and creator tools.
      </p>
      <a href="downloads.html" class="px-8 py-3.5 rounded-xl bg-[var(--accent-color)] hover:bg-blue-600 text-white font-medium shadow-lg transition-all inline-flex items-center gap-2">
        Go to Downloads Page <i class="fas fa-arrow-right text-xs"></i>
      </a>
    </div>
  </section>

</body>
</html>
